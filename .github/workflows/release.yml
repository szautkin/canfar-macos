name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos-app:
    name: Build macOS app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Run tests
        run: |
          xcodebuild test \
            -project Verbinal.xcodeproj \
            -scheme Verbinal \
            -destination 'platform=macOS' \
            -derivedDataPath .derivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Build release app
        run: |
          xcodebuild build \
            -project Verbinal.xcodeproj \
            -scheme Verbinal \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath .derivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          APP_PATH=".derivedData/Build/Products/Release/Verbinal.app"
          DMG_DIR="$(mktemp -d)"
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "Verbinal" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            Verbinal-macOS.dmg

      - name: Create ZIP
        run: |
          ditto -c -k --keepParent \
            .derivedData/Build/Products/Release/Verbinal.app \
            Verbinal-macOS.zip

      - name: Generate checksums
        run: |
          shasum -a 256 Verbinal-macOS.dmg Verbinal-macOS.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verbinal-macos
          path: |
            Verbinal-macOS.dmg
            Verbinal-macOS.zip
            checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Verbinal-macOS.dmg
            Verbinal-macOS.zip
            checksums-sha256.txt
          generate_release_notes: true
