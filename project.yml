name: Verbinal
options:
  bundleIdPrefix: com.codebg
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.codebg.Verbinal
    MARKETING_VERSION: "1.2.5"
    CURRENT_PROJECT_VERSION: "11"
    PRODUCT_NAME: Verbinal
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: A4ABW5VD88
  configs:
    Release:
      # Automatic signing works for App Store submission when archiving
      # via Xcode → Product → Archive → Distribute → App Store Connect.
      # The Organizer generates a fresh Mac App Distribution profile
      # on demand, re-signs with the "3rd Party Mac Developer
      # Application" certificate (downloaded from developer.apple.com),
      # and uploads. No local "Verbinal MAS" profile needs to exist.
      #
      # Switch back to Manual + explicit PROVISIONING_PROFILE_SPECIFIER
      # only for headless CI archive flows (xcodebuild archive +
      # exportArchive) where Xcode can't drive profile generation
      # interactively. In that case download the profile to
      # ~/Library/MobileDevice/Provisioning Profiles/ first.
      #
      # ENABLE_HARDENED_RUNTIME is explicit (App Sandbox implies it
      # but App Store review checks for it explicitly; cheaper to
      # declare than to debate).
      ENABLE_HARDENED_RUNTIME: YES
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ENABLE_NS_ASSERTIONS: NO
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_COMPILATION_MODE: incremental
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_NS_ASSERTIONS: YES
packages:
  VerbinalKit:
    path: shared/VerbinalKit
  GRDB:
    url: https://github.com/groue/GRDB.swift
    # Pinned exactly — .xcodeproj/Package.resolved are gitignored, so this is the
    # only tracked record of the version. GRDB links the OS system libsqlite3, so
    # the on-disk SQLite file stays a standard, portable artifact.
    exactVersion: "7.11.0"
targets:
  Verbinal:
    type: application
    platform: macOS
    sources:
      - path: Verbinal
        excludes:
          - "**/*.py"
    dependencies:
      - package: VerbinalKit
        product: VerbinalKit
      - package: GRDB
        product: GRDB
      # NOTE: the old `CanfarMCP` bundled command-line helper has been
      # removed. A sandboxed bare tool embedded in a MAS app can carry only
      # `app-sandbox` + `inherit`, so when Claude Desktop (a foreign,
      # non-sandboxed process) launches it, it has no sandbox to inherit and
      # SIGTRAPs at launch — i.e. it can never work in a distribution build.
      # The MCP stdio server now lives in the main app binary, reached via
      # `Verbinal mcp` (see Verbinal/MCP/MCPStdioBridge.swift): the app binary
      # carries the bundle's embedded provisioning profile + a full sandbox,
      # so it reaches the App Group socket under App Store distribution
      # signing where a bare tool cannot.
    settings:
      base:
        INFOPLIST_FILE: Verbinal/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.codebg.Verbinal
        CODE_SIGN_ENTITLEMENTS: Verbinal/Verbinal.entitlements
  VerbinalIOS:
    type: application
    platform: iOS
    sources:
      - path: Verbinal
        excludes:
          - "**/*.py"
          # Without explicit excludes, xcodegen also bundles the macOS
          # Info.plist as a resource alongside the iOS one set via
          # INFOPLIST_FILE, producing "Multiple commands produce Info.plist".
          - "Info.plist"
          - "Verbinal.entitlements"
          - "PrivacyInfo.xcprivacy"
          # macOS-only feature modules — excluded from the iOS bundle entirely.
          # Storage browser, FITS viewer, FileBrowser panel, Export dialog, and
          # the MCP integration all depend on AppKit / Metal / a CLI helper
          # that has no iOS equivalent. ContentView already guards the call
          # sites behind #if os(macOS), so excluding the sources keeps the
          # iOS link clean instead of forcing #if guards inside every file.
          - "Export/**"
          - "FileBrowser/**"
          - "FITSViewer/**"
          - "Storage/**"
          - "MCP/**"
          # Service-layer files that exist outside the macOS-only feature
          # dirs but depend on types defined inside them. Keeping them in
          # the iOS target breaks the link.
          - "Research/Services/ResearchExporter.swift"
          - "Search/Services/SearchExporter.swift"
          - "ImageDiscovery/Services/ServiceConformances.swift"
    dependencies:
      - package: VerbinalKit
        product: VerbinalKit
      - package: GRDB
        product: GRDB
    settings:
      base:
        INFOPLIST_FILE: Verbinal/Info-iOS.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.codebg.Verbinal
        PRODUCT_NAME: Verbinal
        CODE_SIGN_ENTITLEMENTS: Verbinal/Verbinal-iOS.entitlements
        # The Mac AppIcon's 1024 PNG has an alpha channel (Mac icons need
        # one for the rounded-corner mask + shadow), which App Store
        # Connect rejects for iOS submissions. AppIcon-iOS holds a
        # flattened opaque variant — same artwork, white background.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-iOS
        # 1 = iPhone, 2 = iPad. Universal binary covers both via
        # AdaptiveLayout (TabView on compact, NavigationSplitView on regular).
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        # The macOS deployment target inherited from base.settings is ignored
        # for iOS builds; IPHONEOS_DEPLOYMENT_TARGET comes from
        # options.deploymentTarget.iOS above.
  VerbinalTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - VerbinalTests
    dependencies:
      - target: Verbinal
      - package: GRDB
        product: GRDB
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.codebg.VerbinalTests
        PRODUCT_NAME: VerbinalTests
        PRODUCT_MODULE_NAME: VerbinalTests
# Explicitly declare schemes as shared so they appear in the aggregate
# canfar-mac.xcworkspace scheme picker. Without this, xcodegen emits
# per-user schemes only and the workspace displays just the Pi scheme.
schemes:
  Verbinal:
    build:
      targets:
        Verbinal: all
        VerbinalTests: [test]
    test:
      targets:
        - VerbinalTests
  VerbinalIOS:
    build:
      targets:
        VerbinalIOS: all
