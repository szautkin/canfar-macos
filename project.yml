name: Verbinal
options:
  bundleIdPrefix: com.codebg
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.codebg.Verbinal
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "7"
    PRODUCT_NAME: Verbinal
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: A4ABW5VD88
  configs:
    Release:
      # Mac App Store submissions require Manual signing with the
      # "3rd Party Mac Developer Application" identity + a MAS-enabled
      # provisioning profile. These values assume a profile named
      # "Verbinal MAS" has been created at developer.apple.com and
      # downloaded to ~/Library/MobileDevice/Provisioning Profiles/.
      # See scripts/mas-submit.sh for the submission pipeline.
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "3rd Party Mac Developer Application"
      PROVISIONING_PROFILE_SPECIFIER: "Verbinal MAS"
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ENABLE_NS_ASSERTIONS: NO
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_COMPILATION_MODE: incremental
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_NS_ASSERTIONS: YES
packages:
  VerbinalKit:
    path: shared/VerbinalKit
targets:
  Verbinal:
    type: application
    platform: macOS
    sources:
      - path: Verbinal
        excludes:
          - "**/*.py"
    dependencies:
      - package: VerbinalKit
        product: VerbinalKit
      - target: CanfarMCP
        embed: true
        codeSign: true
    settings:
      base:
        INFOPLIST_FILE: Verbinal/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.codebg.Verbinal
        CODE_SIGN_ENTITLEMENTS: Verbinal/Verbinal.entitlements
  CanfarMCP:
    type: tool
    platform: macOS
    sources:
      - path: helpers/canfar-mcp
    dependencies:
      - package: VerbinalKit
        product: MCPCore
    settings:
      base:
        PRODUCT_NAME: canfar-mcp
        PRODUCT_BUNDLE_IDENTIFIER: com.codebg.Verbinal.canfar-mcp
        # The helper runs as a subprocess of an MCP client (Claude Desktop
        # etc.) outside the host app's sandbox. It needs read+write to the
        # app's App Support container (resolved via SocketSidecar) to find
        # the running app's socket — that's a regular user-space file path,
        # so no special entitlements required.
        SKIP_INSTALL: NO
  VerbinalTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - VerbinalTests
    dependencies:
      - target: Verbinal
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.codebg.VerbinalTests
        PRODUCT_NAME: VerbinalTests
        PRODUCT_MODULE_NAME: VerbinalTests
# Explicitly declare schemes as shared so they appear in the aggregate
# canfar-mac.xcworkspace scheme picker. Without this, xcodegen emits
# per-user schemes only and the workspace displays just the Pi scheme.
schemes:
  Verbinal:
    build:
      targets:
        Verbinal: all
        VerbinalTests: [test]
    test:
      targets:
        - VerbinalTests
